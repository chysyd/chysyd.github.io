<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人是消费者非生产者</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--border:#2a2a3a;--gold:#c8a84b;--gold-light:#e8c86a;--text:#e8e4d8;--muted:#888070;--red:#c04040}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;font-weight:300;line-height:1.8;overflow-x:hidden}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:60px 24px}
.hero-eyebrow{font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:28px;opacity:0;animation:fadeUp .8s .2s forwards}
.hero-title{font-family:'Noto Serif SC',serif;font-size:clamp(2.4rem,7vw,5.5rem);font-weight:900;line-height:1.15;margin-bottom:24px;opacity:0;animation:fadeUp .9s .4s forwards}
.hero-title em{font-style:normal;color:var(--gold)}
.hero-sub{font-size:clamp(1rem,2.5vw,1.25rem);color:var(--muted);max-width:680px;margin-bottom:48px;opacity:0;animation:fadeUp .9s .6s forwards}
.hero-nav{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;opacity:0;animation:fadeUp .9s .8s forwards}
.hero-nav a{display:inline-block;padding:9px 18px;border:1px solid var(--border);color:var(--text);text-decoration:none;font-size:.82rem;letter-spacing:.06em;transition:all .25s;background:rgba(255,255,255,.02)}
.hero-nav a:hover{border-color:var(--gold);color:var(--gold)}
.section{max-width:860px;margin:0 auto;padding:80px 24px;border-top:1px solid var(--border);opacity:0;transform:translateY(30px);transition:opacity .7s,transform .7s}
.section.visible{opacity:1;transform:none}
.section-label{font-size:.7rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
.section-title{font-family:'Noto Serif SC',serif;font-size:clamp(1.6rem,4vw,2.6rem);font-weight:700;line-height:1.3;margin-bottom:28px}
.section-title .highlight{color:var(--gold)}
.section p{font-size:1.05rem;color:#c8c0b0;margin-bottom:18px;max-width:720px}
.section h3{font-family:'Noto Serif SC',serif;color:var(--gold-light);margin:32px 0 16px;font-size:1.2rem}
.callout{border-left:3px solid var(--gold);background:rgba(200,168,75,.05);padding:20px 24px;margin:28px 0;font-family:'Noto Serif SC',serif;font-size:1.05rem;font-weight:600;color:var(--gold-light);line-height:1.8}
.callout.red{border-left-color:var(--red);background:rgba(192,64,64,.05);color:#e88080}
.callout.white{border-left-color:var(--border);background:rgba(255,255,255,.02);color:var(--text);font-weight:400;font-family:'Noto Sans SC',sans-serif}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin:32px 0;border:1px solid var(--border)}
.compare-header{padding:14px 20px;font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;font-weight:500}
.compare-header.bad{background:rgba(192,64,64,.12);color:var(--red)}
.compare-header.good{background:rgba(200,168,75,.12);color:var(--gold)}
.compare-cell{padding:14px 20px;font-size:.92rem;color:#b0a898;border-top:1px solid var(--border);line-height:1.7}
.compare-cell.bad{background:rgba(192,64,64,.04)}
.compare-cell.good{background:rgba(200,168,75,.04)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:2px;margin:32px 0}
.card{background:var(--surface);border:1px solid var(--border);padding:28px 24px;transition:border-color .2s}
.card:hover{border-color:var(--gold)}
.card-num{font-size:2.5rem;font-family:'Noto Serif SC',serif;font-weight:900;color:rgba(200,168,75,.2);line-height:1;margin-bottom:12px}
.card-title{font-weight:500;font-size:1rem;color:var(--text);margin-bottom:10px}
.card-body{font-size:.88rem;color:var(--muted);line-height:1.7}
.formula{background:var(--surface);border:1px solid var(--border);padding:28px 32px;margin:28px 0;font-family:'Noto Serif SC',serif;font-size:1.05rem;color:var(--text);line-height:2}
.formula .eq{color:var(--gold);font-weight:700}
.formula .note{font-family:'Noto Sans SC',sans-serif;font-size:.82rem;color:var(--muted);margin-top:8px}
.flow{background:var(--surface);border:1px solid var(--border);padding:28px;margin:28px 0;text-align:center}
.flow-item{display:inline-block;padding:10px 18px;border:1px solid var(--border);font-size:.88rem;color:var(--text);margin:6px}
.flow-arrow{display:block;color:var(--gold);font-size:1.4rem;margin:4px 0}
.flow-item.gold{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.06)}
.flow-item.red{border-color:var(--red);color:#e88080;background:rgba(192,64,64,.06)}
.chain{background:var(--surface);border:1px solid var(--border);padding:24px 28px;margin:28px 0;font-size:.9rem;color:#b0a898;line-height:2.2}
.chain .arrow{color:var(--gold);margin:0 4px}
.
